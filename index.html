 them." Afraid to start because they didn't have enough. Afraid to ask because they didn't want to seem like they didn't know.`,missionQuote:`"A person who understands their money - can say no. Can choose. Can plan. Can stop depending on luck — or on other people's decisions about their own life."`,missionP3:"That's what I want for you. Not to become rich \u2014 though that can happen too. But to become someone who knows they have options. Who can look at their situation and make a real decision, not just a reactive one.",missionP4:"And I believe that when enough people reach that point \u2014 when financial confidence becomes something ordinary, not a privilege \u2014 we start making better decisions together. As families. As communities. As a society.",noLockIn:"No lock-in",noLockInDesc:"Use it, leave it, come back. No account. No tracking.",noAgenda:"No agenda",noAgendaDesc:"No fund to sell you. No affiliate deal. No premium tier.",noGate:"No gatekeeping",noGateDesc:"This knowledge belonged to those who could afford an advisor. Not anymore.",inflationBadge:"\u26A0 Most people don't know this",inflationTitle1:"Your savings are",inflationTitle2:"losing value right now.",inflationP1:"Almost all of us save some money. But most of us keep it in cash \u2014 on a current account, under the mattress, or in a basic savings account earning nothing.",inflationAlert:e=>"Inflation runs at ~3% per year. That means \u20AC10,000 sitting in a current account today will have the purchasing power of only about \u20AC5,500 in 20 years. You didn't spend it. You didn't lose it. But inflation quietly ate almost half of it.",inflationItalic:"This is not a scare tactic. It's simple maths \u2014 and most people were never taught it.",startAmount:"Your starting amount",cashLabel:"Cash value (inflation erodes it)",investedLabel:e=>`Invested at ${e}%`,cashIn:e=>`CASH IN ${e} YEARS`,realPower:"real purchasing power",investedIn:e=>`INVESTED IN ${e} YEARS`,atReturn:e=>`at ${e}% annual return`,tenBadge:"The 10% rule",tenTitle:(e,t)=>`If you earn \u20AC${e}/month, put \u20AC${t} away first.`,tenSub:"You will not feel the difference.",tenDesc:"The 10% rule is one of the oldest principles in personal finance \u2014 and it works precisely because 10% sits at the edge of what you notice. Rent, food, transport, social life \u2014 none of that changes. But over 20 years, that 10% compounds into something that gives you real choices.",yourIncome:"Your monthly income",yourTen:"Your 10%",setAside:"set aside first",youLiveOn:"You live on",sameAsBefore:"per month \u2014 same as before",cantDo10:"\u{1F4A1} Can't do 10%? Start with 5% or even 3%. The habit matters more than the amount.",babylonBadge:"This idea is 4,000 years old",babylonBook:"The Richest Man in Babylon \u2014 George S. Clason, 1926",babylonQuote:'"A part of all you earn is yours to keep."',babylonP1:"Arkad, the richest man in ancient Babylon, built his entire fortune on a single rule \u2014 pay yourself first. At least one coin in ten, before rent, before food, before anything. The merchants of Babylon knew this 4,000 years ago.",babylonP2:"The rule has survived four millennia not because markets are complex, but because human nature is simple: we spend what we see. So don't let yourself see it.",babylonRead:"\u{1F4D6} Worth reading \u2014 simple parables, timeless lessons. Available in any library.",lcBadge:"A personal note",lcTitle1:"2 things that changed",lcTitle2:"my financial life.",lcSub:"Not strategies. Not tips. Two ideas that, once you understand them, you cannot unsee.",theBook:"The book",theIdea:"The idea",lcBookP1:"I read this book and it genuinely shocked me \u2014 not because the ideas were complicated, but because they were so simple. Ancient parables set in Babylon, 4,000 years ago. And the core lesson has not changed by a single word.",lcBookQuote:'"A part of all you earn is yours to keep."',arkad:"\u2014 Arkad, the richest man in Babylon",lcBookP2:"The rule has survived 4,000 years not because markets are complicated \u2014 but because human nature is simple. We spend what we see. So the solution is equally simple: don't let yourself see it. Take your 10% before it hits your spending account.",lcBookCta:"Short, easy read. Available in every library. One of the most important books you'll ever open.",compoundTitle:"Compound interest.",compoundSub:"It blew my mind.",lcCompP1:"When I first really understood compound interest \u2014 not as a formula in a textbook, but as a living thing happening to my money \u2014 it genuinely changed how I saw time. Every year that passes is not just another year. It is a multiplier.",chartLabel:"\u20AC50/month at 8% \u2014 what time does",contributed30:"You contributed \u20AC18,000 total over 30 years.",marketAdded:"The market added \u20AC56,000 on top.",lcCompP2:"The curve is not linear. It is slow at first \u2014 almost boring. Then it bends. And in the final years, it grows more in one year than it did in the first decade. That bend is why starting early matters more than starting big.",einstein:"\u2728 Einstein reportedly called it the eighth wonder of the world. Whether he said it or not \u2014 he was right.",initialDeposit:"Initial Deposit",monthly:"Monthly",annualReturn:"Annual Return",timeHorizon:"Time Horizon",yrs:e=>`${e} yrs`,applyDanishTax:"\u{1F1E9}\u{1F1F0} Apply Danish Investment Tax (Aktieskat)",danishTaxTitle:"Danish Capital Gains Tax:",danishTaxDesc:"27% on gains up to ~\u20AC8,200 \xB7 42% on gains above",danishTaxNote:"Tax shown in chart as red area. Estimated at withdrawal. Actual taxation may vary.",futureBalance:"Your future balance",youPutIn:"YOU PUT IN",netGrowth:"NET GROWTH",taxLabel:"\u{1F1E9}\u{1F1F0} TAX",moneyGrew:"Your money grew",growthOverTime:"Growth Over Time",compoundingAtWork:"The widening gap is compounding at work.",redAreaTax:"Red area shows the Danish tax cost over time.",compoundingSecret:"\u{1F4A1} The compounding secret",compoundingDesc:(e,t,r,n,a)=>`At ${e}% annual return over ${t} years, every \u20AC1 invested today becomes \u20AC${r}.${a?` Even after Danish tax, you still end up with ${n}\xD7 your money.`:" The earlier you start, the more time works for you."}`,yourContribs:"Your contributions",netMarketGrowth:"Net market growth",taxDeducted:"\u{1F1E9}\u{1F1F0} Tax deducted",year:"YEAR",contributions:"Contributions:",netGrowthTooltip:"Net growth:",taxTooltip:"\u{1F1E9}\u{1F1F0} Tax deducted:",forBeginners:"For beginners",stepsTitle1:"Your First",stepsTitle2:"4 Steps",stepsTitle3:"to Wealth",stepsSub:"You don't need to understand finance. You just need to follow these steps once \u2014 then let time do the work.",steps:[{num:"01",icon:"\u{1FAA3}",title:"Build a small buffer first",time:"Week 1\u20132",desc:"Before investing, make sure you have 1\u20132 months of expenses in a regular savings account. This is your safety net \u2014 you won't need to sell investments in an emergency.",tip:"Start with just \u20AC500\u2013\u20AC1,000. That's enough."},{num:"02",icon:"\u{1F3E6}",title:"Open an investment account",time:"Week 2\u20133",desc:"In Denmark, open an Aktiesparekonto (ASK) \u2014 it has a reduced tax rate of 17% on gains up to ~\u20AC10,000/year. Otherwise a regular Depot account works too.",tip:"Nordnet and Saxo Bank are popular choices in Denmark. Takes ~15 minutes online."},{num:"03",icon:"\u{1F4E6}",title:"Buy one simple index fund",time:"Week 3",desc:"You don't need to pick stocks. Buy a global index fund like iShares MSCI World or Storebrand Global All Countries. One fund = instant ownership of thousands of companies worldwide.",tip:"Look for funds with a low expense ratio (under 0.5% per year)."},{num:"04",icon:"\u{1F501}",title:"Set up automatic monthly investing",time:"Week 4 \u2014 then forget it",desc:"Set a standing order to transfer \u20AC50 (or whatever you can) every month on payday. Automate it so it's not a decision \u2014 it just happens. This is the most powerful habit in personal finance.",tip:'"Pay yourself first" \u2014 invest before you spend.'}],mythsTitle1:"Things People Believe \u2014",mythsTitle2:"That Aren't True",mythsSub:"These beliefs keep most people from starting. Let's fix that.",myths:[{myth:'"I need thousands to start"',truth:"\u20AC5/month already beats keeping money in a zero-interest account. Start small, increase later."},{myth:`"It's too risky"`,truth:"A global index fund has never lost money over any 20-year period in history. Time reduces risk."},{myth:`"I'll wait for the right moment"`,truth:"Time in the market beats timing the market. Every month you wait costs you compound growth."},{myth:'"I need to understand finance"',truth:"One index fund requires zero expertise. Set it up once, let it run."}],investTitle1:"Where Does the Growth",investTitle2:"Come From?",investSub:"Many ways to put your money to work. No expertise required.",selected:"\u2713 Selected",tryRate:e=>`Try ${e}% \u2191`,investTypes:[{icon:"\u{1F3E6}",name:"High-Yield Savings",range:"~2\u20134% per year",desc:"Your bank pays you interest just for keeping your money there. Zero risk, completely passive.",tryRate:3},{icon:"\u{1F311}",name:"Government Bonds",range:"~3\u20135% per year",desc:"Lend money to a government and receive regular interest. Very low risk, widely considered the safest.",tryRate:4},{icon:"\u{1F4C8}",name:"Index Funds",range:"~7\u201310% per year",desc:"Own a slice of the entire stock market. Historically ~8% annually over decades.",tryRate:8},{icon:"\u{1F4B0}",name:"Dividend Stocks",range:"~3\u20136% per year",desc:"Companies share profits as dividends. Reinvesting them accelerates compounding.",tryRate:5},{icon:"\u{1F3D8}\uFE0F",name:"REITs (Real Estate)",range:"~4\u20138% per year",desc:"Invest in real estate without buying property. REITs pay out rental income as dividends.",tryRate:6}],presets:[{label:"\u{1F3E6} 2% Savings",value:2},{label:"\u{1F311} 4% Bonds",value:4},{label:"\u{1F4C8} 8% Index Fund",value:8},{label:"\u{1F680} 12% Growth",value:12}],learn ar du ikke. Se, hvad \u20AC${e}/m\xE5ned kan blive til \u2014 matematikken er p\xE5 din side.`,tabs:{mission:"\u{1F49A} Min mission",inflation:"\u{1F525} Inflation",lifechanger:"\u2728 Hvad \xE6ndrede mit liv",calculator:"\u{1F9EE} Beregner",start:"\u{1F680} F\xF8rste skridt",invest:"\u{1F4C8} S\xE5dan investerer du",learn:"\u{1F4DA} L\xE6s & L\xE6r"},missionBadge:"Hvorfor jeg byggede dette",missionTitle1:"Jeg har ingen interesse i dine penge.",missionTitle2:"Jeg har en interesse i din frihed.",missionP1:"Equilibra er ikke en bank. Ikke en investeringsplatform. Ikke et produkt, der fors\xF8ger at s\xE6lge dig noget. Der er ingen gebyrer, ingen provisioner, ingen algoritme designet til at holde dig rulende.",missionP2:'Jeg byggede dette, fordi jeg blev ved med at se kloge, dygtige mennesker tr\xE6ffe beslutninger fra et sted af frygt \u2014 bange for at investere, fordi de troede, det "ikke var for folk som dem". Bange for at begynde, fordi de ikke havde nok. Bange for at sp\xF8rge, fordi de ikke ville se uvitende ud.',missionQuote:'"Et menneske, der forst\xE5r sine penge, kan sige nej. Kan v\xE6lge. Kan planl\xE6gge. Kan holde op med at v\xE6re afh\xE6ngig af andres beslutninger om sit eget liv."',missionP3:"Det er det, jeg vil for dig. Ikke at blive rig \u2014 selvom det ogs\xE5 kan ske. Men at blive en person, der ved, at de har muligheder. Som kan se p\xE5 deres situation og tr\xE6ffe en reel beslutning.",missionP4:"Og jeg tror, at n\xE5r nok mennesker n\xE5r dertil \u2014 n\xE5r finansiel selvtillid bliver noget almindeligt, ikke et privilegium \u2014 begynder vi at tr\xE6ffe bedre beslutninger sammen. Som familier. Som samfund.",noLockIn:"Ingen binding",noLockInDesc:"Brug det, forlad det, kom tilbage. Ingen konto. Ingen sporing.",noAgenda:"Ingen skjult dagsorden",noAgendaDesc:"Ingen fond at s\xE6lge dig. Ingen affiliateaftale. Ingen premium-niveau.",noGate:"Ingen adgangsbarrierer",noGateDesc:"Denne viden tilh\xF8rte dem, der havde r\xE5d til en r\xE5dgiver. Ikke mere.",inflationBadge:"\u26A0 De fleste ved ikke dette",inflationTitle1:"Dine opsparing",inflationTitle2:"mister v\xE6rdi lige nu.",inflationP1:"N\xE6sten alle os sparer lidt op. Men de fleste holder pengene kontant \u2014 p\xE5 en l\xF8nkonto, under madrassen eller p\xE5 en basal opsparingskonto der ikke forrentes.",inflationAlert:()=>"Inflationen l\xF8ber p\xE5 ~3% om \xE5ret. Det betyder, at \u20AC10.000 p\xE5 en l\xF8nkonto i dag kun vil have en k\xF8bekraft p\xE5 ca. \u20AC5.500 om 20 \xE5r. Du brugte dem ikke. Du mistede dem ikke. Men inflationen spiste stille og roligt n\xE6sten halvdelen.",inflationItalic:"Dette er ikke skr\xE6mmetaktik. Det er simpel matematik \u2014 og de fleste er aldrig blevet undervist i det.",startAmount:"Dit startbel\xF8b",cashLabel:"Kontantv\xE6rdi (inflation t\xE6rer)",investedLabel:e=>`Investeret ved ${e}%`,cashIn:e=>`KONTANT OM ${e} \xC5R`,realPower:"reel k\xF8bekraft",investedIn:e=>`INVESTERET OM ${e} \xC5R`,atReturn:e=>`ved ${e}% afkast`,tenBadge:"10%-reglen",tenTitle:(e,t)=>`Hvis du tjener \u20AC${e}/m\xE5ned, s\xE6t \u20AC${t} til side f\xF8rst.`,tenSub:"Du vil ikke m\xE6rke forskel.",tenDesc:"10%-reglen er et af de \xE6ldste principper inden for privat\xF8konomi \u2014 og det virker pr\xE6cis fordi 10% ligger p\xE5 gr\xE6nsen af, hvad du bem\xE6rker. Husleje, mad, transport, socialt liv \u2014 intet af det \xE6ndrer sig. Men over 20 \xE5r vokser de 10% til noget, der giver dig reelle muligheder.",yourIncome:"Din m\xE5nedlige indkomst",yourTen:"Dine 10%",setAside:"sat til side f\xF8rst",youLiveOn:"Du lever af",sameAsBefore:"om m\xE5neden \u2014 som hidtil",cantDo10:"\u{1F4A1} Kan du ikke 10%? Start med 5% eller endda 3%. Vanen er vigtigere end bel\xF8bet.",babylonBadge:"Denne id\xE9 er 4.000 \xE5r gammel",babylonBook:"Den rigeste mand i Babylon \u2014 George S. Clason, 1926",babylonQuote:'"En del af alt, hvad du tjener, er din at beholde."',babylonP1:"Arkad, den rigeste mand i det gamle Babylon, byggede sin formue p\xE5 \xE9n regel \u2014 betal dig selv f\xF8rst. Mindst \xE9n m\xF8nt af ti, f\xF8r husleje, f\xF8r mad, f\xF8r alt andet. Babylons k\xF8bm\xE6nd kendte dette for 4.000 \xE5r siden.",babylonP2:"Reglen har overlevet fire \xE5rtusinder ikke fordi markeder er komplekse, men fordi menneskets natur er simpel: vi bruger det, vi ser. L\xF8sningen er derfor lige s\xE5 simpel: lad ikke dig selv se det.",babylonRead:"\u{1F4D6} Kort, let l\xE6sning. Tilg\xE6ngelig p\xE5 ethvert bibliotek. En af de vigtigste b\xF8ger, du nogensinde \xE5bner.",lcBadge:"En personlig note",lcTitle1:"2 ting der \xE6ndrede",lcTitle2:"mit finansielle liv.",lcSub:'Ikke strategier. Ikke tips. To ideer, som du ikke kan "glemme", n\xE5r du f\xF8rst forst\xE5r dem.',theBook:"Bogen",theIdea:"Ideen",lcBookP1:"Jeg l\xE6ste denne bog, og den chokerede mig oprigtigt \u2014 ikke fordi ideerne var komplekse, men fordi de var s\xE5 enkle. Gamle lignelser fra Babylon for 4.000 \xE5r siden. Og den centrale l\xE6re er ikke \xE6ndret med et eneste ord.",lcBookQuote:'"En del af alt, hvad du tjener, er din at beholde."',arkad:"\u2014 Arkad, den rigeste mand i Babylon",lcBookP2:"Reglen har overlevet 4.000 \xE5r ikke fordi markeder er komplicerede \u2014 men fordi menneskets natur er enkel. Vi bruger det, vi ser. L\xF8sningen er lige s\xE5 enkel: lad ikke dig selv se det. Tag dine 10%, inden de rammer din forbrugskonto.",lcBookCta:"Kort, let l\xE6sning. P\xE5 ethvert bibliotek. En af de vigtigste b\xF8ger, du nogensinde \xE5bner.",compoundTitle:"Renters rente.",compoundSub:"Det bl\xE6ste mit sind.",lcCompP1:"Da jeg virkelig forstod renters rente \u2014 ikke som en formel i en l\xE6rebog, men som noget levende, der skete med mine penge \u2014 \xE6ndrede det min opfattelse af tid. Hvert \xE5r er ikke bare et \xE5r. Det er en multiplikator.",chartLabel:"\u20AC50/md. ved 8% \u2014 hvad tid g\xF8r",contributed30:"Du indbetalte \u20AC18.000 i alt over 30 \xE5r.",marketAdded:"Markedet lagde \u20AC56.000 oveni.",lcCompP2:"Kurven er ikke
